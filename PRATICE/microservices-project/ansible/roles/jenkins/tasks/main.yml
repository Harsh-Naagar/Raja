---
# filepath: /home/ubuntu/PRATICE/microservices-project/ansible/roles/jenkins/tasks/main.yml
- name: Update apt cache
  apt:
    update_cache: yes
  become: true

- name: Install required packages
  apt:
    name:
      - openjdk-17-jdk
      - wget
      - gnupg
      - curl
    state: present
  become: true

- name: Add Jenkins GPG key
  apt_key:
    url: https://pkg.jenkins.io/debian/jenkins.io.key
    state: present
  become: true

- name: Add Jenkins repository
  apt_repository:
    repo: "deb https://pkg.jenkins.io/debian binary/"
    state: present
  become: true

- name: Install Jenkins
  apt:
    name: jenkins
    state: present
  become: true

- name: Ensure Jenkins is started
  service:
    name: jenkins
    state: started
    enabled: yes
  become: true

- name: Wait for Jenkins to start
  wait_for:
    port: 8080
    delay: 10
    timeout: 120

- name: Get initial admin password
  command: cat /var/lib/jenkins/secrets/initialAdminPassword
  register: jenkins_admin_password
  changed_when: false
  no_log: true

- name: Set Jenkins admin password fact
  set_fact:
    jenkins_initial_password: "{{ jenkins_admin_password.stdout }}"
  no_log: true

- name: Create Jenkins CLI directory
  file:
    path: /var/lib/jenkins/.jenkins_cli
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'
  become: true

- name: Download Jenkins CLI jar
  get_url:
    url: "http://localhost:8080/jnlpJars/jenkins-cli.jar"
    dest: /var/lib/jenkins/.jenkins_cli/jenkins-cli.jar
    owner: jenkins
    group: jenkins
    mode: '0644'
  register: cli_download
  until: cli_download is succeeded
  retries: 5
  delay: 10
  become: true

- name: Configure Jenkins security matrix
  template:
    src: templates/security.groovy.j2
    dest: /var/lib/jenkins/init.groovy.d/security.groovy
    owner: jenkins
    group: jenkins
    mode: '0644'
  when: jenkins_initial_password is defined